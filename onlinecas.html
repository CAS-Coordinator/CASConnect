<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Online CAS Navigator: Spring 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0B0C10; /* Midnight */
            color: #C5C6C7;
        }
       .neon-mint-text { color: #66FCF1; }
       .neon-mint-border { border-color: #66FCF1; }
       .glass-panel {
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 252, 241, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
       .glass-panel:hover {
            border-color: rgba(102, 252, 241, 0.8);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.3);
            transition: all 0.3s ease;
        }
       .tag-creativity { background-color: #FFC107; color: #000; }
       .tag-activity { background-color: #29B6F6; color: #000; }
       .tag-service { background-color: #66FCF1; color: #000; }
       .tag-hybrid { background: linear-gradient(45deg, #FFC107, #66FCF1); color: #000; }
    </style>
</head>
<body class="min-h-screen p-6" x-data="casApp()">

    <header class="max-w-6xl mx-auto mb-12 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4">Global Online CAS Navigator</h1>
        <h2 class="text-2xl neon-mint-text mb-8">March - April 2026 Edition</h2>
        
        <div class="glass-panel rounded-xl p-6 mx-auto max-w-2xl">
            <h3 class="text-xl font-semibold mb-4 text-white">Opportunities by Global Theme: Spring 2026</h3>
            <canvas id="themeChart" width="400" height="200"></canvas>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold text-white">Spring 2026 Opportunity Grid</h3>
            <select x-model="filterStrand" class="bg-gray-800 text-white border border-gray-600 rounded px-4 py-2">
                <option value="All">All Strands</option>
                <option value="Creativity">Creativity</option>
                <option value="Activity">Activity</option>
                <option value="Service">Service</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="task in filteredTasks" :key="task.id">
                <div class="glass-panel rounded-xl p-6 flex flex-col cursor-pointer" @click="openModal(task)">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-sm font-bold px-2 py-1 rounded" :class="task.tagClass" x-text="task.strand"></span>
                        <span class="text-xs text-gray-400" x-text="task.date"></span>
                    </div>
                    <h4 class="text-xl font-bold text-white mb-2" x-text="task.title"></h4>
                    <p class="text-sm neon-mint-text mb-3" x-text="task.org"></p>
                    <p class="text-sm flex-grow mb-4" x-text="task.summary"></p>
                    <button class="mt-auto border neon-mint-border neon-mint-text rounded py-2 hover:bg-[#66FCF1] hover:text-black transition">Analyze Task</button>
                </div>
            </template>
        </div>
    </main>

    <div x-show="isModalOpen" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50" style="display: none;">
        <div class="glass-panel rounded-xl p-8 max-w-2xl w-full relative" @click.away="closeModal()">
            <button @click="closeModal()" class="absolute top-4 right-4 text-white hover:text-[#66FCF1] text-2xl">&times;</button>
            <h2 class="text-3xl font-bold text-white mb-2" x-text="activeTask.title"></h2>
            <h3 class="text-xl neon-mint-text mb-6" x-text="activeTask.org"></h3>
            
            <div class="mb-6">
                <h4 class="font-bold text-white mb-2">Core Task Analysis</h4>
                <p class="text-sm text-gray-300" x-text="activeTask.description"></p>
            </div>
            
            <div class="mb-6">
                <h4 class="font-bold text-white mb-2">IB Learning Outcomes</h4>
                <p class="text-sm text-gray-300" x-text="activeTask.lo"></p>
            </div>

            <div class="bg-gray-800 rounded p-4 border-l-4 neon-mint-border">
                <h4 class="font-bold text-white mb-1">Digital Reflection Prompt</h4>
                <p class="text-sm italic text-gray-300" x-text="activeTask.prompt"></p>
            </div>
        </div>
    </div>

<script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('casApp', () => ({
                filterStrand: 'All',
                isModalOpen: false,
                activeTask: {},
                tasks: [
                    {
                        id: 1,
                        title: 'Digital Empathy Program', // Placeholder
                        org: 'Unknown Org', // Placeholder
                        date: 'Spring 2026', // Placeholder
                        strand: 'Service', // Placeholder
                        tagClass: 'tag-service', // Placeholder
                        summary: 'A program focused on digital empathy.', // Placeholder
                        description: 'Detailed description goes here.', // Placeholder
                        lo: 'LO6 (Global Significance), LO7 (Ethical Choices)',
                        prompt: 'Analyze how your digital empathy effectively combatted social isolation for younger peers entering the new academic year.'
                    },
                    {
                        id: 2,
                        title: 'Africa Online Children\'s Cafeteria',
                        org: 'NPO Child Doctor Japan',
                        date: 'March 28, 2026',
                        strand: 'Service',
                        tagClass: 'tag-service',
                        summary: 'Cross-cultural exchange and shared digital dining with Kenyan children.',
                        description: 'Utilize teleconferencing software to share a meal and converse with children residing in Kenyan orphanages or community centers, fostering transnational solidarity without geographic constraints.[2]',
                        lo: 'LO5 (Collaboration), LO6 (Global Significance)',
                        prompt: 'Reflect on the contrast between your physical environment and the digital connection established with your peers in Kenya.'
                    },
                    {
                        id: 3,
                        title: 'Step It Up Fitness Challenge',
                        org: 'Health Action Council',
                        date: 'Mar 30 - Apr 26, 2026',
                        strand: 'Activity',
                        tagClass: 'tag-activity',
                        summary: 'Track biometric data in a 4-week wellness adventure to promote health literacy.',
                        description: 'Join a national 4-week wellness adventure using the YuMuuv app.[3] Sync steps and biometric data to a global leaderboard to promote physical activity and community health.[3]',
                        lo: 'LO1 (Strength & Growth), LO4 (Commitment)',
                        prompt: 'How did the gamification and digital tracking of your physical endurance alter your personal motivation over the 4-week period?'
                    },
                    {
                        id: 4,
                        title: 'IoT Refrigerator Sensor Workshop',
                        org: 'Qulii',
                        date: 'March 14, 2026',
                        strand: 'Hybrid',
                        tagClass: 'tag-hybrid',
                        summary: 'Hardware fabrication and environmental data analysis of energy consumption.',
                        description: 'Engineer an open-close sensor for a domestic refrigerator, track the binary data for three months, and visualize behavioral patterns correlating with energy consumption.[4]',
                        lo: 'LO2 (New Skills), LO3 (Initiative & Planning)',
                        prompt: 'Discuss the challenges of compiling code and wiring hardware without physical instructor oversight.'
                    },
                    {
                        id: 5,
                        title: 'Financial Education Video Contest',
                        org: 'Shizuoka FES / Ministry of Education',
                        date: 'Spring 2026',
                        strand: 'Creativity',
                        tagClass: 'tag-creativity',
                        summary: 'Conceptualize and produce a 60-second vertical video on financial literacy.',
                        description: 'Script and edit a one-minute video to teach economic theories to elementary students, incorporating regional charm from Numazu or Mishima to promote localized revitalization.[5]',
                        lo: 'LO2 (New Skills), LO5 (Collaboration)',
                        prompt: 'How did temporal constraints (60 seconds) force you to adapt your pedagogical scripting and video editing?'
                    },
                    {
                        id: 6,
                        title: 'Virtual English Club Co-Facilitator',
                        org: 'Peace Corps Virtual Service',
                        date: 'Starts April/May 2026',
                        strand: 'Hybrid',
                        tagClass: 'tag-hybrid',
                        summary: 'Pro-bono digital consulting and language capacity building.',
                        description: 'Collaborate with international NGOs in Costa Rica or Ukraine to co-design and co-facilitate adult English conversational clubs across significant time zone differentials.[6]',
                        lo: 'LO5 (Collaboration), LO6 (Global Significance)',
                        prompt: 'Examine the emotional intelligence required to maintain engaging cross-cultural instruction in a virtual environment.'
                    },
					{
                        id: 7,
                        title: 'Cloudspotting on Mars: Shapes',
                        org: 'Zooniverse',
                        date: 'Spring 2026',
                        strand: 'Creativity',
                        tagClass: 'tag-creativity',
                        summary: 'Identify Martian cloud formations to help model planetary climates.',
                        description: 'Analyze real telescope data to identify distinct water-ice and carbon-dioxide cloud formations. This project interface is accessible in Japanese.',
                        lo: 'LO2 (New Skills), LO6 (Global Significance)',
                        prompt: 'How did contributing to actual planetary climate modeling shift your perspective on open-source data analysis?'
                    },
                    {
                        id: 8,
                        title: 'Notes from Nature - ROM Revealed',
                        org: 'Zooniverse / Royal Ontario Museum',
                        date: 'Spring 2026',
                        strand: 'Service',
                        tagClass: 'tag-service',
                        summary: 'Transcribe historical specimen labels to track global biodiversity.',
                        description: 'Digitize historical, handwritten specimen labels to contribute directly to the Global Biodiversity Information Facility (GBIF) and track ecosystem changes.',
                        lo: 'LO4 (Commitment & Perseverance), LO6 (Global Significance)',
                        prompt: 'Discuss the importance of preserving historical biodiversity data for modern environmental researchers.'
                    },
                    {
                        id: 9,
                        title: 'The Senses of Stories',
                        org: 'Zooniverse / McGill University',
                        date: 'Spring 2026',
                        strand: 'Creativity',
                        tagClass: 'tag-creativity',
                        summary: 'Analyze literary sentences for sensory language to train AI models.',
                        description: 'Help an international university coalition train advanced AI models to better understand human storytelling by analyzing how literature invokes the senses.',
                        lo: 'LO2 (New Skills), LO7 (Ethical Choices)',
                        prompt: 'Reflect on the intersection of human humanities and artificial intelligence in this data training exercise.'
                    }
                ],
                get filteredTasks() {
                    if (this.filterStrand === 'All') return this.tasks;
                    return this.tasks.filter(t => t.strand === this.filterStrand || t.strand === 'Hybrid');
                },
                openModal(task) {
                    this.activeTask = task;
                    this.isModalOpen = true;
                },
                closeModal() {
                    this.isModalOpen = false;
                    setTimeout(() => { this.activeTask = {}; }, 300);
                }
            }));

            setTimeout(() => {
                const ctx = document.getElementById('themeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Creativity', 'Activity', 'Service', 'Hybrid'],
                        datasets: [{
                            data: [3, 1, 3, 2],
                            backgroundColor: ['#FFC107', '#29B6F6', '#66FCF1', '#a855f7'],
                            borderColor: '#0B0C10',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'right', labels: { color: '#C5C6C7' } }
                        }
                    }
                });
            }, 100);
        });
    </script>
</body>
</html>
